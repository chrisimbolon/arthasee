# =============================================================================
# === docker-compose.yml ===
# Self-contained on purpose — runs anywhere (your Mac, a fresh
# droplet, anywhere) with zero external dependencies. caddy-net
# wiring lives in docker-compose.prod.yml instead, since caddy-net
# only exists on the actual droplet — including it here would break
# local dev the moment anyone tried `docker compose up` on a machine
# that's never heard of that network.
# =============================================================================
services:
  arthasee_db:
    image: postgres:16-alpine
    container_name: arthasee_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       arthasee_db
      POSTGRES_USER:     arthasee
      POSTGRES_PASSWORD: ${DB_PASSWORD:-arthasee_dev_password}
    volumes:
      - arthasee_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - arthasee-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arthasee -d arthasee_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  arthasee_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arthasee_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: arthasee_db
      DB_PORT: "5432"
    networks:
      - arthasee-internal
    depends_on:
      arthasee_db:
        condition: service_healthy

volumes:
  arthasee_pgdata:

networks:
  arthasee-internal:
    name: arthasee-internal
