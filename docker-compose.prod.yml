# =============================================================================
# === docker-compose.prod.yml ===
# Droplet-only addition, combined with the base file via explicit
# -f flags in deploy.yml (docker compose -f docker-compose.yml
# -f docker-compose.prod.yml ...). Never used for local dev — this
# is the ONLY place caddy-net gets referenced, since it only exists
# on the real droplet.
# =============================================================================
services:
  arthasee_backend:
    networks:
      - caddy-net
      # The actual fix, confirmed via `docker network inspect
      # caddy-net` — every container Caddy successfully reverse-
      # proxies to (developindo_backend, rtmudah_api,
      # portfolio-container, etc.) is a real member of this network.
      # Without it, Caddy has no path to this container at all,
      # regardless of how healthy it is internally.
    dns:
      - 1.1.1.1
      - 8.8.8.8
      # Scoped, temporary workaround for the droplet's Docker-embedded
      # DNS resolver (127.0.0.11) intermittently returning "server
      # misbehaving" against this container's own name — confirmed in
      # Caddy's logs as the actual cause of the /api/parts/ POST 502s,
      # and the same signature that hit randomdots-app earlier. Root
      # cause is host-level (systemd-resolved's 127.0.0.53 stub isn't
      # reachable from inside Docker's network namespace) and affects
      # every container on this droplet, not just this one — the real
      # fix is a daemon-wide /etc/docker/daemon.json change, deliberately
      # NOT done here tonight because it requires recreating all 13
      # containers on this shared droplet, not just Arthasee's. This
      # override only changes what arthasee_backend uses for outbound
      # DNS lookups — it has no effect on how OTHER containers resolve
      # names, so it can't make anything else on the droplet worse.
      # Revisit/remove once the daemon-wide fix lands in its own
      # dedicated maintenance window.

networks:
  caddy-net:
    external: true
    name: caddy-net
    # Must already exist on the droplet, created outside this repo.
    # external: true tells Compose "don't create this, just join
    # it" — removing that would make Compose try to create a second,
    # different network sharing the same name, and fail.
