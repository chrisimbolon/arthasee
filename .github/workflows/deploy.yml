# .github/workflows/deploy.yml
# Build on GitHub runner → upload → deploy on Droplet
# Smart rebuild rules:
#   - push:              only rebuild what changed (backend/ or frontend/)
#   - workflow_dispatch: always rebuild EVERYTHING (emergency full deploy)
#
# Adapted from DevelopIndo's own deploy.yml — NOT a straight copy.
# One deliberate removal: DevelopIndo's version had its own inline
# pre-deploy test step (sqlite-backed). Arthasee's settings don't
# support sqlite at all (postgresql-only ENGINE, no DATABASE_URL
# reader), and duplicating a test gate that ci.yml already runs
# correctly — with a real Postgres service and the right test scope —
# is redundant at best. ci.yml is the single source of truth for
# "is this safe to deploy" here; this file only builds and ships.
#
name: Deploy Arthasee to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ─────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history — a push can carry more than 1 commit,
                            # and step 2 now diffs against the real pre-push SHA
                            # (github.event.before), which fetch-depth: 2 could
                            # leave missing on the runner entirely.

      # ── 3. Detect what changed ───────────────────────────────
      - name: Detect changed paths
        id: changes
        run: |
          # ── Manual trigger → always rebuild everything ───────
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "backend=true"  >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "🔧 Manual trigger — deploying EVERYTHING"
            exit 0
          fi

          # ── Push → check what actually changed ───────────────
          # github.event.before, NOT HEAD~1. HEAD~1 only diffs the
          # single most recent commit against its own parent — if a
          # push carries multiple commits (e.g. a feature commit +
          # a follow-up fix, pushed together), any change sitting in
          # an earlier commit of that same push is invisible to it.
          # A push that ends on a frontend-only commit would report
          # backend=false and skip the backend deploy entirely, even
          # though an earlier commit in the same push touched
          # backend/ — exactly the bug that let Sprint 1's migration
          # never reach the droplet. github.event.before is the real
          # pre-push SHA GitHub itself provides, so this now diffs
          # the entire push, not just its last commit.
          BASE_SHA="${{ github.event.before }}"

          # Defensive fallback: on an unusual event where `before` is
          # all-zeros (e.g. a brand-new branch's first push) or
          # missing, fall back to treating everything as changed
          # rather than risk silently comparing against nothing and
          # under-deploying.
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "backend=true"  >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "⚠️  No valid base SHA from github.event.before — deploying EVERYTHING to be safe"
            exit 0
          fi

          # Second, different failure mode from the one above: BASE_SHA
          # can be non-empty, look like a real SHA, and STILL not exist
          # in this checkout — e.g. after `git commit --amend` +
          # force-push, github.event.before points at the pre-amend
          # commit, which is now unreachable from any ref and was
          # never fetched at all. `git diff` against a genuinely
          # missing object fails hard ("fatal: bad object"), which is
          # exactly what happened here. Checking existence explicitly
          # before diffing means this degrades to the same safe
          # "deploy everything" fallback instead of failing the job.
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "backend=true"  >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "⚠️  BASE_SHA $BASE_SHA not found in this checkout (likely a rewritten/force-pushed commit) — deploying EVERYTHING to be safe"
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BASE_SHA" HEAD)
          echo "=== Changed files (entire push, $BASE_SHA..HEAD) ==="
          echo "$CHANGED"
          echo "====================="

          # Backend changed if backend/ OR either compose file changed.
          # docker-compose.prod.yml specifically was missing from this
          # check — a droplet-only config change there (like the DNS
          # override) would report backend=false and skip the deploy
          # step entirely, on a green run, with nothing in the log
          # calling it out. Same class of silent-skip bug as the
          # HEAD~1 fix earlier tonight, different specific trigger.
          if echo "$CHANGED" | grep -qE "^backend/|^docker-compose\.yml$|^docker-compose\.prod\.yml$"; then
            echo "backend=true"  >> $GITHUB_OUTPUT
            echo "✅ Backend/compose changed — will rebuild Django"
          else
            echo "backend=false" >> $GITHUB_OUTPUT
            echo "⏭️  Backend unchanged — skipping Django rebuild"
          fi

          # Frontend changed if frontend/ OR docker-compose.yml changed
          if echo "$CHANGED" | grep -qE "^frontend/|^docker-compose\.yml$"; then
            echo "frontend=true"  >> $GITHUB_OUTPUT
            echo "✅ Frontend/compose changed — will rebuild Next.js"
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
            echo "⏭️  Frontend unchanged — skipping Next.js rebuild"
          fi

      # ── 3. Build Next.js static export (only if frontend changed)
      # No longer building a "standalone" server bundle — output:
      # 'export' in next.config.ts produces pure static files (out/),
      # served directly by Caddy with zero running Node process. See
      # the kla_backend precedent already on this droplet: no
      # kla_frontend container exists at all, same idea applied here.
      - name: Setup Node
        if: steps.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: steps.changes.outputs.frontend == 'true'
        run: cd frontend && npm ci

      - name: Build Next.js static export
        if: steps.changes.outputs.frontend == 'true'
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: https://arthasee.com

      # ── 4. Write production .env (always) ────────────────────
      - name: Write .env file
        env:
          SECRET_KEY:            ${{ secrets.SECRET_KEY }}
          DB_NAME:               ${{ secrets.DB_NAME }}
          DB_USER:               ${{ secrets.DB_USER }}
          DB_PASSWORD:           ${{ secrets.DB_PASSWORD }}
          ALLOWED_HOSTS:         ${{ secrets.ALLOWED_HOSTS }}
          CORS_ALLOWED_ORIGINS:  ${{ secrets.CORS_ALLOWED_ORIGINS }}
          CSRF_TRUSTED_ORIGINS:  ${{ secrets.CSRF_TRUSTED_ORIGINS }}
        run: |
          printf '%s\n' \
            "SECRET_KEY=${SECRET_KEY}" \
            "DEBUG=False" \
            "DJANGO_SETTINGS_MODULE=config.settings.production" \
            "ALLOWED_HOSTS=${ALLOWED_HOSTS}" \
            "CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}" \
            "CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}" \
            "DB_NAME=${DB_NAME}" \
            "DB_USER=${DB_USER}" \
            "DB_PASSWORD=${DB_PASSWORD}" \
            "DB_HOST=arthasee_db" \
            "DB_PORT=5432" \
            "NEXT_PUBLIC_API_URL=https://arthasee.com" \
            > .env

      # ── 5. Set up SSH (always) ────────────────────────────────
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # ── 6. Pull latest code on the droplet (always) ───────────
      # Deliberately its own unconditional step, not buried inside
      # "Deploy backend" — that step only runs when backend/ changed,
      # which meant a commit touching only scripts/, docs, or CI
      # config left the droplet's git checkout silently frozen at
      # whatever commit last touched backend/. git pull costs almost
      # nothing to run every time; there's no good reason for it to
      # be conditional on what else changed in the same push.
      #
      # Must come AFTER "Set up SSH" — this is the actual bug in the
      # first version of this fix: placing it before SSH is
      # configured meant the very first SSH connection of the whole
      # run had no known_hosts entry yet, failing with "Host key
      # verification failed" before ssh-keyscan ever ran.
      - name: Pull latest code on droplet
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'ENDSSH'
            set -e
            cd /home/apps/arthasee
            echo "=== Pulling latest code ==="
            git pull origin main
          ENDSSH

      # ── 7. Upload .env (always) ───────────────────────────────
      - name: Upload .env file
        run: |
          rsync -avz .env \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/apps/arthasee/.env

      # ── 8. Upload static export (only if frontend changed) ────
      # One folder, one destination — static export has no separate
      # standalone/static/public split to manage. Caddy needs to be
      # pointed at this path directly (root * /home/apps/arthasee/frontend/out
      # in the Caddyfile) — not yet confirmed against the real config.
      - name: Upload static export build
        if: steps.changes.outputs.frontend == 'true'
        run: |
          rsync -avz --delete \
            frontend/out/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/apps/arthasee/frontend/out/

      # ── 8. Deploy backend (only if backend changed) ───────────
      - name: Deploy backend
        if: steps.changes.outputs.backend == 'true'
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'ENDSSH'
            set -e
            cd /home/apps/arthasee

            # Code is already current — step 2 pulled it unconditionally,
            # regardless of whether this step ends up running at all.
            # Combines the self-contained base file with the
            # droplet-only caddy-net wiring — every real docker
            # compose call below uses this exact variable, so there's
            # no risk of one invocation silently using a different,
            # inconsistent set of files than the others.
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.prod.yml"

            echo "=== Clearing Docker build cache ==="
            docker builder prune -f

            echo "=== Building backend image ==="
            $COMPOSE build --no-cache --pull arthasee_backend

            echo "=== Starting DB ==="
            $COMPOSE up -d arthasee_db

            echo "=== Waiting for DB to be healthy ==="
            for i in $(seq 1 30); do
              STATUS=$(docker inspect arthasee_db \
                --format='{{.State.Health.Status}}' 2>/dev/null || echo "starting")
              echo "DB: $STATUS ($i/30)"
              [ "$STATUS" = "healthy" ] && echo "✅ DB ready!" && break
              [ "$i" -eq 30 ] && echo "❌ DB timeout!" && exit 1
              sleep 3
            done

            echo "=== Running migrations ==="
            $COMPOSE run --rm arthasee_backend \
              python manage.py migrate --noinput

            echo "=== Verifying migrations actually applied ==="
            # Extended to inventory alongside service — the Sprint 1
            # gate only checked apps.service, and this refactor moved
            # real models (and a real migration) into apps.inventory.
            # A future unapplied migration there deserves the exact
            # same loud, in-log failure as one in service — not a
            # narrower net just because this app is newer.
            MIGRATION_STATUS=$($COMPOSE run --rm arthasee_backend \
              python manage.py showmigrations service inventory)
            echo "$MIGRATION_STATUS"
            if echo "$MIGRATION_STATUS" | grep -q "\[ \]"; then
              echo "❌ Unapplied migration(s) detected in apps.service or apps.inventory — deploy is not actually complete."
              exit 1
            fi
            echo "✅ All service and inventory migrations applied"

            echo "=== Collecting static files ==="
            $COMPOSE run --rm arthasee_backend \
              python manage.py collectstatic --noinput

            # ── Recreate backend ──────────────────────────────
            # Replaced the old stop/rm/up dance entirely.
            # --force-recreate is unconditional: Compose does not
            # get to "decide" the existing container already
            # satisfies the desired state, which is exactly the
            # ambiguity that let a 9-hour-old container survive
            # a "successful" deploy on 2026-07-21. One command,
            # one guaranteed outcome, nothing left implicit.
            echo "=== Force-recreating backend ==="
            $COMPOSE up -d --no-deps --force-recreate arthasee_backend

            # ── Verify: existence, freshness, AND network ─────
            # Existence alone was the old check, and it's exactly
            # what passed while a stale container sat there. Age
            # and network membership are the two properties that
            # actually distinguish "really redeployed" from
            # "silently unchanged" — so both are now hard gates
            # that fail the deploy loudly instead of reporting
            # green over a lie.
            echo "=== Verifying container actually persisted ==="
            sleep 2

            if ! docker ps -a --format '{{.Names}}' | grep -q '^arthasee_backend$'; then
              echo "❌ Container does not exist immediately after 'docker compose up -d'."
              echo "=== docker compose up output, run again in foreground for full detail ==="
              $COMPOSE up --no-deps arthasee_backend 2>&1 | head -60 || true
              exit 1
            fi
            echo "✅ Container exists: $(docker ps -a --filter name=arthasee_backend --format '{{.Status}}')"

            echo "=== Verifying container is actually fresh ==="
            CREATED=$(docker inspect arthasee_backend --format '{{.Created}}')
            CREATED_EPOCH=$(date -u -d "$CREATED" +%s)
            NOW_EPOCH=$(date -u +%s)
            AGE=$((NOW_EPOCH - CREATED_EPOCH))
            echo "Container created: $CREATED ($AGE seconds ago)"

            if [ "$AGE" -gt 60 ]; then
              echo "❌ Container is ${AGE}s old — this is a STALE container, not a fresh recreate!"
              echo "❌ force-recreate silently failed to actually recreate it — investigate before trusting this deploy."
              exit 1
            fi
            echo "✅ Container genuinely recreated $AGE seconds ago"

            echo "=== Verifying container joined caddy-net ==="
            NETWORKS=$(docker inspect arthasee_backend \
              --format '{{range $k, $v := .NetworkSettings.Networks}}{{$k}} {{end}}')
            echo "Networks joined: $NETWORKS"

            if ! echo "$NETWORKS" | grep -q "caddy-net"; then
              echo "❌ Container is NOT on caddy-net — Caddy cannot reach it, deploy is broken."
              exit 1
            fi
            echo "✅ caddy-net confirmed"

            echo "=== Last 40 lines of backend logs ==="
            docker logs arthasee_backend --tail 40 2>&1 || true

            echo "=== Backend restarted ==="
          ENDSSH


      # Steps 9-10 from the original DevelopIndo pattern are gone
      # entirely here — "pull code for frontend-only deploy" and
      # "restart frontend container" both assumed a running frontend
      # container that no longer exists. The rsync in step 7 already
      # put the new static files on disk; Caddy's file_server reads
      # straight from disk on every request, so nothing needs
      # restarting for a content-only change to take effect.

      # ── 9. Health check + Caddy reload (always) ───────────────
      - name: Health check and Caddy reload
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'ENDSSH'
            echo "=== Waiting for backend health ==="
            for i in $(seq 1 30); do
              CODE=$(docker exec arthasee_backend \
                curl -s -o /dev/null -w "%{http_code}" \
                -H "Authorization: Bearer skip" \
                -H "X-Forwarded-Proto: https" \
                -H "Host: arthasee.com" \
                http://localhost:8000/api/organizations/mine/ \
                2>/dev/null || echo "000")
              echo "Backend response: $CODE ($i/30)"
              [ "$CODE" = "401" ] || [ "$CODE" = "200" ] \
                && echo "✅ Backend healthy!" && break
              [ "$i" -eq 30 ] && echo "❌ Backend timeout!" && exit 1
              sleep 3
            done

            echo "=== Reloading Caddy ==="
            CADDY=$(docker ps -qf "name=caddy")
            [ -n "$CADDY" ] && docker exec $CADDY \
              caddy reload --config /etc/caddy/Caddyfile 2>/dev/null \
              && echo "✅ Caddy reloaded!" \
              || echo "⚠️  Caddy reload skipped"

            echo "=== Deploy complete! ==="
            cd /home/apps/arthasee
            echo "$(date) | $(git rev-parse --short HEAD) | OK" >> deploy.log
            docker ps | grep arthasee
          ENDSSH
