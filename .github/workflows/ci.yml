name: CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB:       arthasee_test
          POSTGRES_USER:     arthasee
          POSTGRES_PASSWORD: arthasee_test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: config.settings.local
      SECRET_KEY:              ci-secret-key-not-for-production
      DEBUG:                   "True"
      # These match config/settings/local.py's actual config() calls
      # directly — DevelopIndo's own ci.yml sets a DATABASE_URL
      # instead, which Arthasee's settings never read at all.
      DB_NAME:     arthasee_test
      DB_USER:     arthasee
      DB_PASSWORD: arthasee_test_pass
      DB_HOST:     localhost
      DB_PORT:     "5432"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # 3.12.7 — matches the pyenv-pinned local dev version, not
          # DevelopIndo's 3.14. Testing against a Python version
          # nobody actually develops against defeats the point of CI.
          python-version: "3.12.7"
          cache: pip
          cache-dependency-path: backend/requirements/base.txt
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements/base.txt
      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate --noinput
      - name: Run tests
        working-directory: backend
        # All three apps with real tests — apps.core has none of its
        # own (it's just the abstract TenantScopedModel/
        # TenantScopedAPIView base classes), so it's deliberately
        # left out rather than included for a false sense of coverage.
        run: python manage.py test apps.authentication apps.organizations apps.service --verbosity=2

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
